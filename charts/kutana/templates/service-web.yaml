{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: web
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API Server — /api/... (legacy path, rewrites to strip /api)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-server
                port:
                  number: 8000
          # Audio Service — /audio/...
          - path: /audio(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: audio-service
                port:
                  number: 8001
          # MCP Server — /mcp/...
          - path: /mcp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mcp-server
                port:
                  number: 3001
---
# Direct /v1 route — no rewrite needed since api-server mounts routes at /v1.
# Separate Ingress because the main internal ingress uses rewrite-target: /$2
# which would strip the /v1 prefix.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-v1
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8000
---
{{- if .Values.ingress.publicHosts }}
# Public API subdomain — api-dev.kutana.ai → api-server at root (no /api rewrite).
# TLS terminates at Cloudflare edge, so no in-cluster tls block.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-api-public
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.publicHosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8000
---
{{- end }}
# Separate Ingress for WebSocket routes (agent-gateway) with long timeouts
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-ws
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Agent Gateway — /ws/...
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-gateway
                port:
                  number: 8003
          # Agent Gateway — /human/...
          - path: /human(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-gateway
                port:
                  number: 8003
---
{{- if .Values.ingress.publicHosts }}
# Public WS subdomain — ws-dev.kutana.ai → agent-gateway at root (no rewrite).
# Clients connect to wss://ws-dev.kutana.ai/agent/connect or /connect directly.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-ws-public
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.publicHosts.ws }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-gateway
                port:
                  number: 8003
---
{{- end }}
# Web frontend — catch-all (no rewrite, Prefix match has lowest specificity)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-web
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
{{- if .Values.ingress.publicHosts }}
---
# Public web subdomain — dev.kutana.ai. No ssl-redirect: TLS terminates at
# Cloudflare edge and cloudflared forwards as plain HTTP to localhost:80.
# A local ssl-redirect would cause a 308 loop since nginx sees HTTP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-web-public
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.publicHosts.web }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
{{- end }}
{{- if .Values.langfuse.enabled }}
---
# Langfuse — local mDNS only (no Cloudflare tunnel)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kutana.fullname" . }}-langfuse
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: langfuse.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
{{- end }}
{{- end }}

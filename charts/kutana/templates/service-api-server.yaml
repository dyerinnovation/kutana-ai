{{- if .Values.apiServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: api-server
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

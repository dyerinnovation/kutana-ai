{{- if .Values.taskEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-engine
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: task-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.taskEngine.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: task-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-engine
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: task-engine
          image: {{ include "kutana.image" (dict "root" . "svc" "task-engine" "tag" .Values.taskEngine.image.tag) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kutana.fullname" . }}-config
            - secretRef:
                name: {{ include "kutana.fullname" . }}-secret
          {{- range $key, $value := .Values.taskEngine.env }}
          env:
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.taskEngine.resources | nindent 12 }}
{{- end }}

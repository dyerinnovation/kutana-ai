apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kutana.fullname" . }}-secret
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DEEPGRAM_API_KEY: {{ .Values.secrets.deepgramApiKey | quote }}
  STT_API_KEY: {{ .Values.secrets.deepgramApiKey | quote }}
  AGENT_GATEWAY_STT_API_KEY: {{ .Values.secrets.deepgramApiKey | quote }}
  AGENT_GATEWAY_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  STORAGE_ACCESS_KEY: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  STORAGE_SECRET_KEY: {{ .Values.minio.auth.rootPassword | b64enc | quote }}

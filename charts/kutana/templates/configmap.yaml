apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kutana.fullname" . }}-config
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ include "kutana.databaseUrl" . | quote }}
  DATABASE_URL_SYNC: {{ include "kutana.databaseUrlSync" . | quote }}
  REDIS_URL: {{ include "kutana.redisUrl" . | quote }}
  KUTANA_DOMAIN: {{ .Values.global.domain | quote }}
  KUTANA_MESSAGE_BUS: "redis"
  STT_PROVIDER: "deepgram"
  LOG_LEVEL: "info"
  CORS_ORIGINS: {{ .Values.apiServer.corsOrigins | default "http://localhost:3000,http://localhost:5173,https://dev.kutana.ai,https://kutana.spark-b0f2.local" | quote }}
  # Task engine uses extraction windows
  EXTRACTION_WINDOW_SECONDS: "30"
  EXTRACTION_OVERLAP_SECONDS: "5"
  # Agent Gateway uses AGENT_GATEWAY_ prefix (pydantic-settings)
  AGENT_GATEWAY_DATABASE_URL: {{ include "kutana.databaseUrl" . | quote }}
  AGENT_GATEWAY_REDIS_URL: {{ include "kutana.redisUrl" . | quote }}
  AGENT_GATEWAY_STT_PROVIDER: "deepgram"
  AGENT_GATEWAY_JWT_SECRET: "kutana-dev-secret-2026"
  AGENT_GATEWAY_WHISPER_API_URL: ""
  AGENT_GATEWAY_TTS_PROVIDER: {{ .Values.agentGateway.ttsProvider | default "cartesia" | quote }}
  AGENT_GATEWAY_TTS_CARTESIA_MODEL: {{ .Values.agentGateway.ttsCartesiaModel | default "sonic-3" | quote }}
  # Worker (feed dispatcher/runner)
  KUTANA_MCP_URL: "http://mcp-server.{{ .Release.Namespace }}.svc:3001/"
  # Object storage (S3-compatible — MinIO in dev, cloud in prod)
  STORAGE_PROVIDER: {{ .Values.storage.provider | default "s3" | quote }}
  STORAGE_ENDPOINT: "http://minio.{{ .Release.Namespace }}.svc:9000"
  STORAGE_BUCKET: {{ .Values.storage.bucket | default "kutana-uploads" | quote }}
  STORAGE_REGION: {{ .Values.storage.region | default "us-east-1" | quote }}
  STORAGE_USE_SSL: {{ .Values.storage.useSSL | default "false" | quote }}
  # Stripe billing
  STRIPE_TRIAL_DAYS: {{ .Values.billing.trialDays | quote }}
  BILLING_SUCCESS_URL: {{ .Values.billing.successUrl | quote }}
  BILLING_CANCEL_URL: {{ .Values.billing.cancelUrl | quote }}
  BILLING_PORTAL_RETURN_URL: {{ .Values.billing.portalReturnUrl | quote }}
  STRIPE_PRICE_BASIC_MONTHLY: {{ .Values.billing.priceBasicMonthly | quote }}
  STRIPE_PRICE_BASIC_YEARLY: {{ .Values.billing.priceBasicYearly | quote }}
  STRIPE_PRICE_PRO_MONTHLY: {{ .Values.billing.priceProMonthly | quote }}
  STRIPE_PRICE_PRO_YEARLY: {{ .Values.billing.priceProYearly | quote }}
  STRIPE_PRICE_BUSINESS_MONTHLY: {{ .Values.billing.priceBusinessMonthly | quote }}
  STRIPE_PRICE_BUSINESS_YEARLY: {{ .Values.billing.priceBusinessYearly | quote }}
  # Slack OAuth
  SLACK_REDIRECT_URI: "https://{{ .Values.global.domain }}/api/v1/integrations/slack/callback"
  FRONTEND_URL: "https://{{ .Values.global.domain }}"

{{- if .Values.langfuse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-clickhouse
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: langfuse-clickhouse
spec:
  serviceName: langfuse-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: clickhouse
          image: "{{ .Values.langfuse.clickhouse.image.repository }}:{{ .Values.langfuse.clickhouse.image.tag }}"
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.langfuse.clickhouse.credentials.database | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.langfuse.clickhouse.credentials.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.langfuse.clickhouse.credentials.password | quote }}
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.langfuse.clickhouse.resources | nindent 12 }}
          volumeMounts:
            - name: langfuse-clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-config
              mountPath: /etc/clickhouse-server/config.d/keeper-config.xml
              subPath: keeper-config.xml
      volumes:
        - name: clickhouse-config
          configMap:
            name: langfuse-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: langfuse-clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.langfuse.clickhouse.persistence.size }}
{{- end }}

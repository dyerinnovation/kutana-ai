{{- if .Values.agentGateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: agent-gateway
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: agent-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: agent-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

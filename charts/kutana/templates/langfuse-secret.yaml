{{- if .Values.langfuse.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kutana.fullname" . }}-langfuse-secret
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
type: Opaque
data:
  NEXTAUTH_SECRET: {{ .Values.secrets.langfuseNextauthSecret | quote }}
  SALT: {{ .Values.secrets.langfuseSalt | quote }}
{{- end }}

{{- if .Values.langfuse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

{{- if .Values.langfuse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-pg
      protocol: TCP
      name: tcp-pg
  selector:
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

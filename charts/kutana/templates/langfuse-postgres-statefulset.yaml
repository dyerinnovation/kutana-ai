{{- if .Values.langfuse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  labels:
    {{- include "kutana.labels" . | nindent 4 }}
    app.kubernetes.io/name: langfuse-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: langfuse-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.langfuse.postgres.image.repository }}:{{ .Values.langfuse.postgres.image.tag }}"
          ports:
            - name: tcp-pg
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.langfuse.postgres.credentials.database }}
            - name: POSTGRES_USER
              value: {{ .Values.langfuse.postgres.credentials.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.langfuse.postgres.credentials.password }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: langfuse-postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.langfuse.postgres.credentials.username }}
                - -d
                - {{ .Values.langfuse.postgres.credentials.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.langfuse.postgres.credentials.username }}
                - -d
                - {{ .Values.langfuse.postgres.credentials.database }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: langfuse-postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.langfuse.postgres.persistence.size }}
{{- end }}

{{- if .Values.discordMcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-mcp
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: discord-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.discordMcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: discord-mcp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discord-mcp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: discord-mcp
          image: {{ include "convene.image" (dict "root" . "svc" "discord-mcp" "tag" .Values.discordMcp.image.tag) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "convene.fullname" . }}-config
            - secretRef:
                name: {{ include "convene.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.discordMcp.resources | nindent 12 }}
{{- end }}

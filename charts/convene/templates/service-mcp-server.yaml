{{- if .Values.mcpServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

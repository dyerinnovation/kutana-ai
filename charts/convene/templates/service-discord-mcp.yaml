{{- if .Values.discordMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: discord-mcp
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: discord-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: discord-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

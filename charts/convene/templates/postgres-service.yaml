apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-pg
      protocol: TCP
      name: tcp-pg
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}

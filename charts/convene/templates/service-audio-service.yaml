{{- if .Values.audioService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: audio-service
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: audio-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: audio-service
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "convene.fullname" . }}-migrate
  labels:
    {{- include "convene.labels" . | nindent 4 }}
    app.kubernetes.io/name: migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "convene.image" (dict "root" . "svc" "api-server" "tag" .Values.apiServer.image.tag) }}
          command:
            - alembic
            - upgrade
            - head
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "convene.fullname" . }}-config
                  key: DATABASE_URL_SYNC

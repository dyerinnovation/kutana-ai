global:
  domain: spark-b0f2.local
  registryPrefix: localhost:30500/convene

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
postgres:
  image:
    repository: pgvector/pgvector
    tag: pg16
  persistence:
    size: 10Gi
  credentials:
    database: convene
    username: convene
    password: convene

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    size: 5Gi

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
apiServer:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

agentGateway:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

audioService:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

taskEngine:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

mcpServer:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

worker:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {}

discordMcp:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Web Frontend
# ---------------------------------------------------------------------------
web:
  enabled: true
  replicas: 1
  image:
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ---------------------------------------------------------------------------
# Secrets (base64-encoded values — override at install time)
# ---------------------------------------------------------------------------
secrets:
  jwtSecret: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=
  deepgramApiKey: "MmU5YmVlYzRhY2EzY2ZlMmVmMDA0Nzc2OTQzY2UzMTExZjg4NjE4Mg=="
  anthropicApiKey: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: convene.spark-b0f2.local

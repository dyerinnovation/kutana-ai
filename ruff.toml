target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line length handled by formatter
    "RUF001", # ambiguous unicode chars (en dashes, etc.) are intentional in prose
    "RUF002", # same for docstrings
    "RUF003", # same for comments
]

[lint.per-file-ignores]
# FastAPI route files: Pydantic models and Depends() require runtime type access.
# Moving imports to TYPE_CHECKING would break validation and DI at runtime.
"**/routes/*.py" = ["TCH001", "TCH002", "TCH003"]
# Service entrypoints configure logging before imports (intentional).
"**/main.py" = ["E402"]

[lint.isort]
known-first-party = [
    "kutana_core",
    "kutana_providers",
    "kutana_memory",
    "api_server",
    "audio_service",
    "task_engine",
    "worker",
]

[format]
quote-style = "double"
indent-style = "space"

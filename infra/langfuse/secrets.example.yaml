# Langfuse secrets — copy to secrets.yaml and fill in real values.
#
# NEVER commit secrets.yaml (it is gitignored via **/secrets.yaml).
#
# Generate values:
#   salt:            openssl rand -base64 32
#   nextauth.secret: openssl rand -base64 32
#   encryptionKey:   openssl rand -hex 32
#   clickhouse pw:   openssl rand -base64 16
#   postgres pw:     openssl rand -base64 16
#
# S3 keys: copy from the kutana-secret in the cluster:
#   kubectl get secret kutana-secret -n kutana -o jsonpath='{.data.STORAGE_ACCESS_KEY}' | base64 -d
#   kubectl get secret kutana-secret -n kutana -o jsonpath='{.data.STORAGE_SECRET_KEY}' | base64 -d
# ---------------------------------------------------------------------------

langfuse:
  salt:
    value: "REPLACE_WITH_openssl_rand_-base64_32"

  nextauth:
    secret:
      value: "REPLACE_WITH_openssl_rand_-base64_32"

  encryptionKey:
    value: "REPLACE_WITH_openssl_rand_-hex_32"

clickhouse:
  auth:
    password: "REPLACE_WITH_clickhouse_password"

postgresql:
  auth:
    password: "REPLACE_WITH_postgres_password"

s3:
  accessKeyId:
    value: "REPLACE_WITH_STORAGE_ACCESS_KEY"
  secretAccessKey:
    value: "REPLACE_WITH_STORAGE_SECRET_KEY"

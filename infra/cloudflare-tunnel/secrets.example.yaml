# Cloudflare Tunnel — K8s Secret template
#
# 1. Create a Cloudflare Tunnel in the dashboard:
#      https://one.dash.cloudflare.com → Networks → Tunnels → Create a tunnel
#    Configure public hostnames pointing to cluster services, e.g.:
#      woodpecker.<your-domain> → http://woodpecker-server.woodpecker.svc:80
#      convene.<your-domain>    → http://api-server.convene.svc:8000
#
# 2. Copy the tunnel token shown in the dashboard connector install step.
#
# 3. Copy this file:
#      cp infra/cloudflare-tunnel/secrets.example.yaml infra/cloudflare-tunnel/secrets.yaml
#
# 4. Fill in the token (secrets.yaml is .gitignored)
#
# 5. Apply:
#      kubectl apply -f infra/cloudflare-tunnel/secrets.yaml
#      kubectl apply -f infra/cloudflare-tunnel/deployment.yaml
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-secrets
  namespace: cloudflared
type: Opaque
stringData:
  # The full tunnel token from the Cloudflare dashboard
  TUNNEL_TOKEN: "your-cloudflare-tunnel-token"

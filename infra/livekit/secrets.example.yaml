# LiveKit Credentials
#
# This is NOT a K8s manifest — it is a README-style template showing how to
# create the livekit-credentials secret that install.sh requires.
#
# NEVER store real keys in this file. It is safe to commit.
#
# Generate values:
#   api-key:    openssl rand -hex 16
#   api-secret: openssl rand -hex 32
#
# Create the K8s secret:
#   kubectl create secret generic livekit-credentials \
#     --namespace kutana \
#     --from-literal=api-key-1=YOUR_API_KEY \
#     --from-literal=api-secret-1=YOUR_API_SECRET
#
# Verify the secret exists:
#   kubectl get secret livekit-credentials -n kutana
#
# Store the generated key/secret in:
#   ~/Documents/dev/z-api-keys-and-tokens/livekit-credentials.md

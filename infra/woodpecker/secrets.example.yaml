# Woodpecker CI — K8s Secret template
#
# 1. Copy this file:
#      cp infra/woodpecker/secrets.example.yaml infra/woodpecker/secrets.yaml
#
# 2. Fill in the real values (secrets.yaml is .gitignored)
#
# 3. Apply:
#      kubectl apply -f infra/woodpecker/secrets.yaml
#
# Or let deploy.sh do it for you.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: woodpecker-secrets
  namespace: woodpecker
type: Opaque
stringData:
  # GitHub OAuth App credentials
  # Create at: https://github.com/organizations/dyerinnovation/settings/applications
  # Authorization callback URL: https://<your-public-host>/authorize
  WOODPECKER_GITHUB_CLIENT: "your-github-oauth-client-id"
  WOODPECKER_GITHUB_SECRET: "your-github-oauth-client-secret"

  # Shared secret between Woodpecker server and agent
  # Generate with: openssl rand -hex 32
  WOODPECKER_AGENT_SECRET: "generate-with-openssl-rand-hex-32"

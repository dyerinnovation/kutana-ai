# Woodpecker CI pipeline for Kutana AI
# Stages: lint → (type-check ∥ test) → build → deploy
#
# Build and deploy only run on pushes to main.
# Services (postgres, redis) are available to all steps via hostname.
---

# ---------------------------------------------------------------------------
# Services (sidecars — available to all steps)
# ---------------------------------------------------------------------------
services:
  - name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kutana
      POSTGRES_PASSWORD: kutana
      POSTGRES_DB: kutana

  - name: redis
    image: redis:7-alpine

# ---------------------------------------------------------------------------
# Pipeline steps
# ---------------------------------------------------------------------------
steps:

  # ── secret-scan ──────────────────────────────────────────────────────────
  - name: secret-scan
    image: zricethezav/gitleaks:v8.21.2
    commands:
      - gitleaks detect --source . --config .gitleaks.toml --baseline-path .gitleaks-baseline.json --verbose

  # ── lint ──────────────────────────────────────────────────────────────────
  - name: lint
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    commands:
      - uv sync
      - uv run ruff check .
      - uv run ruff format --check .
    depends_on: [secret-scan]

  # ── type-check (parallel with test, depends on lint) ──────────────────────
  - name: type-check
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    commands:
      - uv sync
      - uv run mypy packages/kutana-core/
    depends_on: [lint]

  # ── test ──────────────────────────────────────────────────────────────────
  - name: test
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    environment:
      DATABASE_URL: postgresql+asyncpg://kutana:kutana@postgres:5432/kutana
      REDIS_URL: redis://redis:6379/0
    commands:
      - uv sync
      - uv run pytest -x -v
    depends_on: [lint]

  # ── eval-mock (runs on prompt/eval changes) ────────────────────────────────
  - name: eval-mock
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    environment:
      ANTHROPIC_API_KEY:
        from_secret: anthropic_api_key
    commands:
      - uv sync
      - uv run pytest evals/ -m mock -v --timeout=300
    depends_on: [lint]
    when:
      path:
        - "evals/**"
        - "internal-docs/development/managed-agent-system-prompts.md"

  # ── eval-e2e (manual trigger only) ────────────────────────────────────────
  - name: eval-e2e
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    environment:
      ANTHROPIC_API_KEY:
        from_secret: anthropic_api_key
      KUTANA_AUTH_TOKEN:
        from_secret: kutana_auth_token
      KUTANA_API_BASE: https://api-dev.kutana.ai/v1
      KUTANA_REDIS_URL: redis://redis:6379/0
    commands:
      - uv sync
      - uv run pytest evals/ -m e2e -v --timeout=600
    depends_on: [lint]
    when:
      event: manual

  # ── build (main branch only) ───────────────────────────────────────────────
  # Runs on the DGX Spark Docker daemon via the host socket.
  # Pushes both :<sha> and :latest tags to the local K3s registry.
  - name: build
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - |
        set -e
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
        REGISTRY="localhost:30500/kutana"
        echo "==> Building images for commit ${SHORT_SHA}"
        for svc in api-server agent-gateway audio-service task-engine mcp-server worker web; do
          if [ "$svc" = "web" ]; then
            DF="web/Dockerfile"
          else
            DF="services/${svc}/Dockerfile"
          fi
          echo ""
          echo "--- Building ${svc}:${SHORT_SHA} ---"
          docker build \
            -t "${REGISTRY}/${svc}:${SHORT_SHA}" \
            -t "${REGISTRY}/${svc}:latest" \
            -f "${DF}" \
            .
          docker push "${REGISTRY}/${svc}:${SHORT_SHA}"
          docker push "${REGISTRY}/${svc}:latest"
        done
        echo ""
        echo "==> All images pushed successfully (tag: ${SHORT_SHA})"
    depends_on: [test, type-check]
    when:
      branch: main
      event: push

  # ── deploy (main branch only) ─────────────────────────────────────────────
  # Uses network_mode: host so that 127.0.0.1:6443 (K3s API server) is reachable.
  # Kubeconfig at /etc/rancher/k3s/k3s.yaml is mounted read-only from the host.
  - name: deploy
    image: alpine/helm:3.16.3
    network_mode: host
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/root/.kube/config:ro
    environment:
      KUBECONFIG: /root/.kube/config
    commands:
      - |
        set -e
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
        echo "==> Deploying kutana with imageTag=${SHORT_SHA}"
        helm upgrade --install kutana charts/kutana \
          --namespace kutana \
          --create-namespace \
          --set global.imageTag="${SHORT_SHA}" \
          --wait \
          --timeout 5m
        echo "==> Deploy complete"
    depends_on: [build]
    when:
      branch: main
      event: push

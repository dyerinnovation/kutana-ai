services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: convene
      POSTGRES_PASSWORD: convene
      POSTGRES_DB: convene
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convene"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_AGENT_CONFIG_ID: ${MCP_AGENT_CONFIG_ID:-}
      API_BASE_URL: http://host.docker.internal:8000
      GATEWAY_WS_URL: ws://host.docker.internal:8003
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3001"

volumes:
  postgres_data:
  redis_data:
